name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    # head / debug are nightly Ruby builds that periodically break on bundler or
    # rubygems issues unrelated to this project; let them fail without blocking
    # the workflow or canceling the stable-version jobs.
    continue-on-error: ${{ matrix.ruby-version == 'head' || matrix.ruby-version == 'debug' }}
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ["3.2", "3.3", "3.4", "4.0", "head", "debug"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
      - name: Run tests
        run: bundle exec rake test